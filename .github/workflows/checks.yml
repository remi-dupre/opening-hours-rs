name: Checks

on:
  - push
  - pull_request

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---
  # --- Run tests and lints for Rust library
  # ---

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate:
          - .
          - compact-calendar
          - opening-hours-c
          - opening-hours-py
          - opening-hours-syntax
          - fuzz
        features: [""]
        include:
          - { crate: ".", features: "log" }
          - { crate: ".", features: "log,auto-country" }
          - { crate: ".", features: "log,auto-country,auto-timezone" }
          - { crate: ".", features: "log,auto-timezone" }
          - { crate: "opening-hours-syntax", features: "std" }
    defaults:
      run:
        working-directory: ${{ matrix.crate }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Display rust version
        run: |
          rustc --version
          cargo clippy -- --version
          cargo fmt -- --version
      - name: Lint
        run: cargo clippy --no-default-features --features "${{ matrix.features }}" -- -D warnings
      - name: Format
        run: cargo fmt -- --check
      - name: Tests
        run: cargo test --no-default-features --features "${{ matrix.features }}"

  ffi-miri:
    name: "ffi tests with Miri"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup override set nightly
          cargo miri setup
      - name: Test with Miri
        run: cargo miri test -p opening-hours-c

  # ---
  # --- Check that all versions are consistency accross packages
  # ---

  check-version:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4
      - name: Install poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
      - name: Install dependancies
        run: poetry install
      - name: Check version consistency
        run: poetry run ./check-version.py

  # ---
  # --- Check that python stub file is up to date
  # ---

  check-stub:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opening-hours-py
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Install poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
      - name: Install poetry deps
        run: poetry install --with lint
      - name: Check that Python stub file is up to date
        run: cargo run --bin stub_gen -- check

  # ---
  # --- Calculate coverage using cargo-llvm-cov
  # --- See https://github.com/taiki-e/cargo-llvm-cov#github-actions-and-codecov
  # ---

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate code coverage
        run: >-
          cargo llvm-cov 
          --all-features 
          --workspace 
          --lcov 
          --output-path lcov.info
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{secrets.CODECOV_TOKEN}}
